<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Aktaruzzaman Shuvo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <nav></nav>
  <aside class="sidebar"></aside>

  <main class="main-content" id="main-content"></main>

  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
  <script>
    buildPage({ page: 'projects', navActive: 'projects', assetPrefix: '../' });

    function renderProject(proj, idx) {
      const slides = proj.slides && proj.slides.length
        ? `<div class="slideshow-wrapper">
             <div class="slideshow-container">
               ${proj.slides.map((s,i)=>`<img class="slide" src="${s}" alt="${proj.title} photo ${i+1}">`).join('')}
             </div>
           </div>` : '';

      const driveLink = proj.drive
        ? `<a class="project-link" href="${proj.drive}" target="_blank"><i class="fas fa-external-link-alt"></i> Google Drive</a>`
        : `<span style="font-size:0.78rem;color:#d1d5db"><i class="fas fa-clock"></i> Drive link coming soon</span>`;

      return `
        <div class="project-card">
          <p class="project-title"><span style="color:var(--teal-dim);margin-right:6px">${String(idx+1).padStart(2,'0')}.</span> ${proj.title}</p>
          <p class="project-desc">${proj.desc}</p>
          ${driveLink}
          ${slides}
        </div>`;
    }

    function renderLevel(lv) {
      const empty = lv.projects.length === 0
        ? `<div style="padding:2rem;text-align:center;color:#9ca3af;font-style:italic">
             <i class="fas fa-hard-hat" style="font-size:1.5rem;margin-bottom:0.5rem;display:block"></i>
             Projects coming soon...
           </div>` : '';

      return `
        <section>
          <div class="level-heading">
            <span class="level-badge ${lv.badge}">${lv.label}</span>
          </div>
          <hr class="fancy-hr">
          ${lv.projects.map((p,i) => renderProject(p, i)).join('')}
          ${empty}
        </section>`;
    }

    document.getElementById('main-content').innerHTML = `
      <section>
        <h1 class="section-title" style="text-align:center">Innovation in Action</h1>
        <p style="text-align:center;color:#6b7280">Highlights of my academic & research projects</p>
        <hr class="fancy-hr">
      </section>
      ${SITE_DATA.projects.levels.map(renderLevel).join('')}
    `;

    initSlideshows();
  </script>
</body>
</html>
