<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic — Aktaruzzaman Shuvo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <nav></nav>
  <aside class="sidebar"></aside>

  <main class="main-content" id="main-content"></main>

  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
  <script>
    buildPage({ page: 'academic', navActive: 'academic', assetPrefix: '../' });

    const levels = SITE_DATA.academic.levels;

    function renderLevel(lv) {
      const slides = lv.slides && lv.slides.length
        ? `<div class="slideshow-wrapper">
             <div class="slideshow-container">
               ${lv.slides.map((s,i) => `<img class="slide" src="${s}" alt="${lv.label} photo ${i+1}">`).join('')}
             </div>
           </div>` : '';

      const courses = lv.courses
        ? `<p style="margin-top:0.8rem"><strong>Core Courses:</strong></p>
           <div class="course-grid">${lv.courses.map(c=>`<span class="course-tag">${c}</span>`).join('')}</div>` : '';

      const tools = lv.tools
        ? `<p style="margin-top:0.7rem"><strong>Software Tools:</strong> <span style="color:#6b7280;font-size:0.85rem">${lv.tools}</span></p>` : '';

      const hardware = lv.hardware
        ? `<p><strong>Hardware Platforms:</strong> <span style="color:#6b7280;font-size:0.85rem">${lv.hardware}</span></p>` : '';

      return `
        <section id="${lv.id}">
          <div class="level-heading">
            <span class="level-badge ${lv.badge}">${lv.label}</span>
          </div>
          <div class="info-card">
            <p style="font-weight:600;color:var(--navy);font-size:1rem">${lv.title}</p>
            <p style="color:var(--teal-dim);font-size:0.85rem;margin:0.2rem 0">
              <i class="fas fa-university"></i> ${lv.school} &nbsp;|&nbsp;
              <i class="fas fa-calendar"></i> ${lv.period}
            </p>
            <p style="margin-top:0.3rem">
              <a href="${lv.mapLink}" target="_blank" style="color:var(--sky);font-size:0.8rem;margin-right:1rem"><i class="fas fa-map-marker-alt"></i> Map</a>
              <a href="${lv.webLink}" target="_blank" style="color:var(--sky);font-size:0.8rem"><i class="fas fa-globe"></i> Website</a>
            </p>
          </div>
          ${lv.body.map(b => `<p>${b}</p>`).join('')}
          ${courses}
          ${tools}
          ${hardware}
          ${slides}
          <hr class="fancy-hr">
        </section>`;
    }

    document.getElementById('main-content').innerHTML = `
      <section>
        <h1 class="section-title" style="text-align:center">An Overview of My Academic Journey</h1>
        <hr class="fancy-hr">
      </section>
      ${levels.map(renderLevel).join('')}
    `;

    initSlideshows();
  </script>
</body>
</html>
