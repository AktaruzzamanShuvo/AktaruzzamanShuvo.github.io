<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktaruzzaman Shuvo — EEE Researcher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <nav></nav>
  <aside class="sidebar"></aside>

  <main class="main-content" id="main-content">
    <!-- Content injected by JS -->
  </main>

  <script src="assets/data.js"></script>
  <script src="assets/site.js"></script>
  <script>
    buildPage({ page: 'home', navActive: 'home', assetPrefix: '' });

    /* ---- Render home content ---- */
    const d = SITE_DATA.home;
    const p = SITE_DATA.profile;

    document.getElementById('main-content').innerHTML = `

      <!-- Bio -->
      <section id="bio">
        <h1 class="section-title">Bio</h1>
        ${d.bio.map(t => `<p>${t}</p>`).join('')}
      </section>

      <!-- Research Interests -->
      <section id="interests">
        <h1 class="section-title">Research Interests</h1>
        <p>My research focuses on advancing sustainable energy solutions through the following areas:</p>
        <div class="interest-grid">
          ${d.interests.map(i => `<span class="interest-tag"><i class="fas fa-atom" style="margin-right:5px;font-size:0.75rem;color:var(--teal-dim)"></i>${i}</span>`).join('')}
        </div>
      </section>

      <!-- Updates -->
      <section id="updates">
        <h1 class="section-title">Updates</h1>
        <div class="news-feed">
          ${d.updates.map(u => `
            <div class="news-item">
              <i class="fas fa-bullhorn news-icon"></i>
              <span class="news-text">${u}</span>
            </div>`).join('')}
        </div>
      </section>

      <!-- Recent Publications -->
      <section id="recent-pubs">
        <h1 class="section-title">Recent Publications</h1>
        <div class="pub-list">
          ${[...d.recentPubs].reverse().map(pub => `
            <div class="pub-card ${pub.type}">
              <span class="pub-badge ${pub.type}"><i class="fas fa-${pub.type === 'journal' ? 'journal-whills' : 'users'}"></i> ${pub.badge}</span>
              <p class="pub-title">${pub.title}</p>
              <p class="pub-cite">${pub.cite}</p>
            </div>`).join('')}
        </div>
      </section>
    `;
  </script>
</body>
</html>
