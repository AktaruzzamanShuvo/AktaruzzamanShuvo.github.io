<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research — Aktaruzzaman Shuvo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <nav></nav>
  <aside class="sidebar"></aside>

  <main class="main-content" id="main-content"></main>

  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
  <script>
    buildPage({ page: 'research', navActive: 'research', assetPrefix: '../' });

    const d = SITE_DATA.research;
    const conf  = d.papers.filter(p => p.type === 'conference');
    const journ = d.papers.filter(p => p.type === 'journal');

    function paperCard(pub, num) {
      return `
        <div class="pub-card ${pub.type}">
          <span class="pub-badge ${pub.type}">
            <i class="fas fa-${pub.type === 'journal' ? 'book-open' : 'users'}"></i> ${pub.badge}
          </span>
          <p class="pub-title">${num}. ${pub.title}</p>
          <p style="font-size:0.82rem;color:#6b7280;margin:0.3rem 0;">${pub.venue}</p>
          <p class="pub-desc">${pub.desc}</p>
          <p class="pub-cite"><strong>Cite:</strong> ${pub.cite}<br>
            <a href="${pub.doi}" target="_blank"><i class="fas fa-external-link-alt"></i> ${pub.doi}</a>
          </p>
        </div>`;
    }

    document.getElementById('main-content').innerHTML = `
      <section>
        <h1 class="section-title">Publications</h1>
        <p>${d.intro}</p>
        <hr class="fancy-hr">
      </section>

      <section>
        <div class="level-heading">
          <span class="level-badge conference" style="background:rgba(251,191,36,0.15);color:#b45309;border:1px solid rgba(251,191,36,0.3);">
            <i class="fas fa-users"></i> Conference Papers
          </span>
        </div>
        <div class="pub-list">
          ${conf.map((p, i) => paperCard(p, i+1)).join('')}
        </div>
      </section>

      <section>
        <div class="level-heading">
          <span class="level-badge journal" style="background:rgba(100,255,218,0.15);color:#0d9488;border:1px solid rgba(100,255,218,0.3);">
            <i class="fas fa-book-open"></i> Journal Articles
          </span>
        </div>
        <div class="pub-list">
          ${journ.map((p, i) => paperCard(p, i+1)).join('')}
        </div>
      </section>
    `;
  </script>
</body>
</html>
