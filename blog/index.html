<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Aktaruzzaman Shuvo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <nav></nav>
  <aside class="sidebar"></aside>

  <main class="main-content" id="main-content"></main>

  <script src="../assets/data.js"></script>
  <script src="../assets/site.js"></script>
  <script>
    buildPage({ page: 'blog', navActive: 'blog', assetPrefix: '../' });

    const posts = SITE_DATA.blog.posts;

    document.getElementById('main-content').innerHTML = posts.length === 0
      ? `<section>
           <h1 class="section-title">Blog</h1>
           <div class="under-construction">
             <div class="big-icon">🚧</div>
             <h2>Coming Soon</h2>
             <p>This page is currently under construction.<br>
                I'm handling everything independently — thank you for your patience!</p>
           </div>
         </section>`
      : `<section>
           <h1 class="section-title">Blog</h1>
           ${posts.map(post => `
             <article class="info-card" style="margin-bottom:1.5rem">
               <p style="font-weight:600;color:var(--navy);font-size:1rem">${post.title}</p>
               <p style="font-size:0.78rem;color:var(--slate);margin-bottom:0.5rem"><i class="fas fa-calendar"></i> ${post.date}</p>
               <p>${post.body}</p>
             </article>`).join('')}
         </section>`;
  </script>
</body>
</html>
